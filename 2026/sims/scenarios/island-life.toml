# Island Life scenario — full IslandLife cast on Anguilla geography
#
# Vendors:
#   Bob — BCG (Bob's Curry Goat) at Sandy Ground beach
#   Rita — RMF (Rita's Mango Futures) at George Hill
#   Dave — DEB (Dave's E-Bikes) at Blowing Point
#   Oscar — OGP (Oscar's Goat Plates) at The Valley (competing, incompetent)
#
# Exchange agents:
#   Charlie — CCC (Charlie's Cruise Credits, USD-pegged), main exchange at the dock
#   Ziggy — ZIC (Ziggy's Island Credits), aggressive competitor at The Valley
#   Ted — TCC (Ted's Caribbean Credits), regional intermediary in Tortola
#
# Consumers (multi-vendor — each buys from 2 vendors via their exchange):
#   Alice — tourist, buys BCG + RMF via Charlie on the beach
#   Eddie — local investor, buys BCG + OGP via Charlie on the village road
#   Karen — nurse, buys RMF + DEB via Charlie at George Hill
#   Luke — tourist, buys DEB + BCG via Ziggy at Blowing Point
#   Mona — local, buys BCG + DEB via Ziggy at The Valley
#
# Recorders:
#   Gene — primary recorder at Crocus Bay
#   Faythe — backup recorder at George Hill
#
# MQTT is enabled for exchange agent block notifications.

[simulation]
name = "island-life"
title = "Island Life — Sandy Ground Beach Economy"
description = "A beach economy on Anguilla: four vendors, three exchanges, five consumers. Each consumer shops at multiple vendors through their exchange — Alice alternates between curry goat and mangoes, Luke rents bikes and grabs lunch."
what_to_watch = [
    "Each consumer visits multiple vendors — watch Alice alternate between Bob and Rita",
    "Charlie serves 4 vendors from a single dock exchange — a true marketplace hub",
    "Ziggy competes on BCG and DEB — Luke and Mona use him for lower rates",
    "Transaction arcs on the map show multi-vendor shopping patterns",
]
recorder_port = 0
speed = 1.0             # real-time (1x)
duration_secs = 300     # 5 minutes
mqtt_port = 1884

# ── Vendors ──────────────────────────────────────────────────────────

[[agent]]
name = "Bob"
role = "vendor"
blurb = "Sells curry goat at Sandy Ground — the anchor vendor"
lat = 18.2003
lon = -63.0908          # Sandy Ground beach

[agent.vendor]
symbol = "BCG"
description = "Bob's Curry Goat"
coins = "1000000000"
shares = "2^40"
plate_price = 25
initial_float = 100

[[agent]]
name = "Rita"
role = "vendor"
blurb = "Sells mango futures at George Hill"
lat = 18.2173
lon = -63.0578          # George Hill

[agent.vendor]
symbol = "RMF"
description = "Rita's Mango Futures"
coins = "500000000"
shares = "2^38"
plate_price = 10
initial_float = 200

[[agent]]
name = "Dave"
role = "vendor"
blurb = "Rents e-bikes at Blowing Point"
lat = 18.1755
lon = -63.0925          # Blowing Point

[agent.vendor]
symbol = "DEB"
description = "Dave's E-Bikes"
coins = "200000000"
shares = "2^36"
plate_price = 50
initial_float = 40

[[agent]]
name = "Oscar"
role = "vendor"
blurb = "Sells goat plates in The Valley — cheaper than Bob, but sketchy"
lat = 18.2167
lon = -63.0500          # The Valley

[agent.vendor]
symbol = "OGP"
description = "Oscar's Goat Plates"
coins = "2000000000"        # over-issued relative to demand
shares = "2^42"
plate_price = 20            # cheaper than Bob, but sketchy
initial_float = 50

# ── Recorders ────────────────────────────────────────────────────────

[[agent]]
name = "Gene"
role = "recorder"
blurb = "Hosts all blockchains from Crocus Bay"
lat = 18.2060
lon = -63.1510          # Crocus Bay

[[agent]]
name = "Faythe"
role = "recorder"
blurb = "Backup recorder at George Hill"
lat = 18.2173
lon = -63.0578          # George Hill

# ── Exchange agents ──────────────────────────────────────────────────

[[agent]]
name = "Charlie"
role = "exchange"
blurb = "Main exchange at Sandy Ground dock — issues CCC (Cruise Credits)"
lat = 18.1975
lon = -63.0900          # Sandy Ground dock

[agent.exchange]
referral_fee = 0.05         # 5% referral fee on cross-chain trades
rebalance_threshold = 0.25  # restock when below 25% of initial

pairs = [
    { sell = "BCG", buy = "CCC", rate = 12.0 },   # 1 BCG plate ($25) = 12 CCC ($2.08 each)
    { sell = "RMF", buy = "CCC", rate = 5.0 },    # 1 RMF plate ($10) = 5 CCC
    { sell = "DEB", buy = "CCC", rate = 24.0 },   # 1 DEB plate ($50) = 24 CCC
    { sell = "OGP", buy = "CCC", rate = 8.0 },    # 1 OGP plate ($20) = 8 CCC
]

# Charlie issues CCC (his own chain) and stocks vendor inventory
[[agent.exchange.inventory]]
vendor = "Bob"
plates = 80

[[agent.exchange.inventory]]
vendor = "Rita"
plates = 150

[[agent.exchange.inventory]]
vendor = "Dave"
plates = 30

[[agent.exchange.inventory]]
vendor = "Oscar"
plates = 20

[[agent]]
name = "Ziggy"
role = "exchange"
blurb = "Aggressive competitor — undercuts Charlie with ZIC (Island Credits)"
lat = 18.2100
lon = -63.0600          # The Valley area

[agent.exchange]
referral_fee = 0.02         # 2% referral — Ziggy undercuts Charlie
rebalance_threshold = 0.30  # more aggressive restocking

pairs = [
    { sell = "BCG", buy = "ZIC", rate = 11.4 },  # Ziggy undercuts: BCG for 11.4 ZIC vs Charlie's 12 CCC
    { sell = "DEB", buy = "ZIC", rate = 22.0 },  # DEB for 22 ZIC (cheaper than Charlie's 24)
]

[[agent.exchange.inventory]]
vendor = "Bob"
plates = 60

[[agent.exchange.inventory]]
vendor = "Dave"
plates = 25

[[agent]]
name = "Ted"
role = "exchange"
blurb = "Regional exchange in Road Town, Tortola — issues TCC"
lat = 18.4400
lon = -64.6200          # off-island (Road Town, Tortola — regional)

[agent.exchange]
referral_fee = 0.03
rebalance_threshold = 0.20

pairs = [
    { sell = "BCG", buy = "TCC", rate = 10.0 },   # Ted's regional rate
    { sell = "RMF", buy = "TCC", rate = 4.0 },
]

[[agent.exchange.inventory]]
vendor = "Bob"
plates = 40

[[agent.exchange.inventory]]
vendor = "Rita"
plates = 80

# ── CCC vendor (Charlie also issues CCC) ─────────────────────────────
# Charlie's Cruise Credits are the USD-pegged payment chain.
# Consumers buy CCC from Charlie directly (acts as both vendor and exchange).

[[agent]]
name = "CCC-Issuer"
role = "vendor"
blurb = "Issues Charlie's Cruise Credits (USD-pegged payment chain)"
lat = 18.1978
lon = -63.0897          # next to Charlie at Sandy Ground dock

[agent.vendor]
symbol = "CCC"
description = "Charlie's Cruise Credits"
coins = "10000000000"       # high supply — USD peg, many small transactions
shares = "2^44"
plate_price = 1             # 1 CCC = ~$2
initial_float = 5000

# Ziggy issues ZIC (his own payment chain)
[[agent]]
name = "ZIC-Issuer"
role = "vendor"
blurb = "Issues Ziggy's Island Credits"
lat = 18.2105
lon = -63.0605          # next to Ziggy at The Valley

[agent.vendor]
symbol = "ZIC"
description = "Ziggy's Island Credits"
coins = "5000000000"
shares = "2^42"
plate_price = 1
initial_float = 3000

# Ted issues TCC (regional payment chain)
[[agent]]
name = "TCC-Issuer"
role = "vendor"
blurb = "Issues Ted's Caribbean Credits"
lat = 18.4405
lon = -64.6205          # next to Ted in Tortola

[agent.vendor]
symbol = "TCC"
description = "Ted's Caribbean Credits"
coins = "5000000000"
shares = "2^42"
plate_price = 1
initial_float = 2000

# ── Consumers (multi-vendor round-robin) ────────────────────────────

[[agent]]
name = "Alice"
role = "consumer"
blurb = "Tourist — buys curry goat and mango futures via Charlie"
lat = 18.2008
lon = -63.0905          # Sandy Ground beach

[agent.consumer]
buy_from = "Charlie"
pay_symbol = "CCC"
fund_from = "CCC-Issuer"

[[agent.consumer.purchases]]
want_symbol = "BCG"
redeem_at = "Bob"
interval_secs = 30

[[agent.consumer.purchases]]
want_symbol = "RMF"
redeem_at = "Rita"
interval_secs = 40

[[agent]]
name = "Eddie"
role = "consumer"
blurb = "Local investor — buys curry goat and goat plates via Charlie"
lat = 18.2025
lon = -63.0878          # Sandy Ground village road

[agent.consumer]
buy_from = "Charlie"
pay_symbol = "CCC"
fund_from = "CCC-Issuer"

[[agent.consumer.purchases]]
want_symbol = "BCG"
redeem_at = "Bob"
interval_secs = 45

[[agent.consumer.purchases]]
want_symbol = "OGP"
redeem_at = "Oscar"
interval_secs = 35

[[agent]]
name = "Karen"
role = "consumer"
blurb = "Nurse at George Hill — buys mango futures and e-bike rentals via Charlie"
lat = 18.2165
lon = -63.0560          # near George Hill hospital

[agent.consumer]
buy_from = "Charlie"
pay_symbol = "CCC"
fund_from = "CCC-Issuer"

[[agent.consumer.purchases]]
want_symbol = "RMF"
redeem_at = "Rita"
interval_secs = 40

[[agent.consumer.purchases]]
want_symbol = "DEB"
redeem_at = "Dave"
interval_secs = 60

[[agent]]
name = "Luke"
role = "consumer"
blurb = "Tourist at Blowing Point — rents e-bikes and buys curry goat via Ziggy"
lat = 18.1760
lon = -63.0920          # Blowing Point

[agent.consumer]
buy_from = "Ziggy"
pay_symbol = "ZIC"
fund_from = "ZIC-Issuer"

[[agent.consumer.purchases]]
want_symbol = "DEB"
redeem_at = "Dave"
interval_secs = 60

[[agent.consumer.purchases]]
want_symbol = "BCG"
redeem_at = "Bob"
interval_secs = 45

[[agent]]
name = "Mona"
role = "consumer"
blurb = "Local in The Valley — buys curry goat and e-bikes via Ziggy"
lat = 18.2100
lon = -63.0500          # The Valley

[agent.consumer]
buy_from = "Ziggy"
pay_symbol = "ZIC"
fund_from = "ZIC-Issuer"

[[agent.consumer.purchases]]
want_symbol = "BCG"
redeem_at = "Bob"
interval_secs = 35

[[agent.consumer.purchases]]
want_symbol = "DEB"
redeem_at = "Dave"
interval_secs = 50
