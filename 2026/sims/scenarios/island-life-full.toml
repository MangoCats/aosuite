# Island Life Full — complete IslandLife narrative with CAA atomic exchange
#
# Extension of island-life.toml with:
#   - Charlie and Ziggy use CAA atomic swaps
#   - Some consumers use atomic mode, others use legacy two-leg
#   - Victor validates all chains
#   - Mallory attempts double-spend attacks
#
# Vendors:
#   Bob — BCG (Bob's Curry Goat) at Sandy Ground beach
#   Rita — RMF (Rita's Mango Futures) at George Hill
#   Dave — DEB (Dave's E-Bikes) at Blowing Point
#   Oscar — OGP (Oscar's Goat Plates) at The Valley
#
# Exchange agents (atomic CAA):
#   Charlie — CCC (Charlie's Cruise Credits), main exchange at the dock, atomic
#   Ziggy — ZIC (Ziggy's Island Credits), aggressive competitor at The Valley, atomic
#   Ted — TCC (Ted's Caribbean Credits), regional in Tortola, legacy
#
# Consumers (multi-vendor, mixed atomic and legacy):
#   Alice — atomic via Charlie: BCG + RMF
#   Eddie — atomic via Charlie: BCG + OGP
#   Karen — legacy via Charlie: RMF + DEB
#   Luke — atomic via Ziggy: DEB + BCG
#   Mona — legacy via Ziggy: BCG + DEB
#
# MQTT enabled for exchange agent block notifications.

[simulation]
name = "island-life-full"
title = "Island Life Full — Atomic Exchange on Anguilla"
description = "The complete IslandLife scenario with CAA atomic swaps and multi-vendor consumers. Each consumer shops at multiple vendors — Alice alternates between curry goat and mangoes, Luke rents bikes and grabs lunch. Victor validates while Mallory attacks."
what_to_watch = [
    "Each consumer visits multiple vendors — watch Alice alternate between Bob and Rita",
    "Solid purple arcs are atomic (CAA) swaps — dashed arcs are legacy two-leg trades",
    "Charlie serves 4 vendors, Ziggy serves 2 — realistic exchange marketplace hubs",
    "Mallory attempts double-spend attacks on Bob — all should be rejected",
]
recorder_port = 0
speed = 1.0             # real-time (1x)
duration_secs = 300     # 5 minutes
mqtt_port = 1884

# ── Vendors ──────────────────────────────────────────────────────────

[[agent]]
name = "Bob"
role = "vendor"
blurb = "Sells curry goat at Sandy Ground — the anchor vendor"
lat = 18.2003
lon = -63.0908          # Sandy Ground beach

[agent.vendor]
symbol = "BCG"
description = "Bob's Curry Goat"
coins = "1000000000"
shares = "2^40"
plate_price = 25
initial_float = 100

[[agent]]
name = "Rita"
role = "vendor"
blurb = "Sells mango futures at George Hill"
lat = 18.2173
lon = -63.0578          # George Hill

[agent.vendor]
symbol = "RMF"
description = "Rita's Mango Futures"
coins = "500000000"
shares = "2^38"
plate_price = 10
initial_float = 200

[[agent]]
name = "Dave"
role = "vendor"
blurb = "Rents e-bikes at Blowing Point"
lat = 18.1755
lon = -63.0925          # Blowing Point

[agent.vendor]
symbol = "DEB"
description = "Dave's E-Bikes"
coins = "200000000"
shares = "2^36"
plate_price = 50
initial_float = 40

[[agent]]
name = "Oscar"
role = "vendor"
blurb = "Sells goat plates in The Valley"
lat = 18.2167
lon = -63.0500          # The Valley

[agent.vendor]
symbol = "OGP"
description = "Oscar's Goat Plates"
coins = "2000000000"
shares = "2^42"
plate_price = 20
initial_float = 50

# ── Recorders ────────────────────────────────────────────────────────

[[agent]]
name = "Gene"
role = "recorder"
blurb = "Primary recorder at Crocus Bay"
lat = 18.2060
lon = -63.1510          # Crocus Bay

[[agent]]
name = "Faythe"
role = "recorder"
blurb = "Backup recorder at George Hill"
lat = 18.2173
lon = -63.0578          # George Hill

# ── Exchange agents ──────────────────────────────────────────────────

[[agent]]
name = "Charlie"
role = "exchange"
blurb = "Main exchange at Sandy Ground dock — uses CAA atomic swaps"
lat = 18.1975
lon = -63.0900          # Sandy Ground dock

[agent.exchange]
atomic = true
escrow_secs = 120
referral_fee = 0.05
rebalance_threshold = 0.25

pairs = [
    { sell = "BCG", buy = "CCC", rate = 12.0 },
    { sell = "RMF", buy = "CCC", rate = 5.0 },
    { sell = "DEB", buy = "CCC", rate = 24.0 },
    { sell = "OGP", buy = "CCC", rate = 8.0 },
]

[[agent.exchange.inventory]]
vendor = "Bob"
plates = 80

[[agent.exchange.inventory]]
vendor = "Rita"
plates = 150

[[agent.exchange.inventory]]
vendor = "Dave"
plates = 30

[[agent.exchange.inventory]]
vendor = "Oscar"
plates = 20

[[agent]]
name = "Ziggy"
role = "exchange"
blurb = "Aggressive competitor — atomic swaps at lower rates"
lat = 18.2100
lon = -63.0600          # The Valley area

[agent.exchange]
atomic = true
escrow_secs = 90
referral_fee = 0.02
rebalance_threshold = 0.30

pairs = [
    { sell = "BCG", buy = "ZIC", rate = 11.4 },
    { sell = "DEB", buy = "ZIC", rate = 22.0 },
]

[[agent.exchange.inventory]]
vendor = "Bob"
plates = 60

[[agent.exchange.inventory]]
vendor = "Dave"
plates = 25

[[agent]]
name = "Ted"
role = "exchange"
blurb = "Regional legacy exchange in Tortola"
lat = 18.4400
lon = -64.6200          # Road Town, Tortola

[agent.exchange]
referral_fee = 0.03
rebalance_threshold = 0.20

pairs = [
    { sell = "BCG", buy = "TCC", rate = 10.0 },
    { sell = "RMF", buy = "TCC", rate = 4.0 },
]

[[agent.exchange.inventory]]
vendor = "Bob"
plates = 40

[[agent.exchange.inventory]]
vendor = "Rita"
plates = 80

# ── Payment chain issuers ───────────────────────────────────────────

[[agent]]
name = "CCC-Issuer"
role = "vendor"
blurb = "Issues Charlie's Cruise Credits"
lat = 18.1978
lon = -63.0897          # next to Charlie at Sandy Ground dock

[agent.vendor]
symbol = "CCC"
description = "Charlie's Cruise Credits"
coins = "10000000000"
shares = "2^44"
plate_price = 1
initial_float = 5000

[[agent]]
name = "ZIC-Issuer"
role = "vendor"
blurb = "Issues Ziggy's Island Credits"
lat = 18.2105
lon = -63.0605          # next to Ziggy at The Valley

[agent.vendor]
symbol = "ZIC"
description = "Ziggy's Island Credits"
coins = "5000000000"
shares = "2^42"
plate_price = 1
initial_float = 3000

[[agent]]
name = "TCC-Issuer"
role = "vendor"
blurb = "Issues Ted's Caribbean Credits"
lat = 18.4405
lon = -64.6205          # next to Ted in Tortola

[agent.vendor]
symbol = "TCC"
description = "Ted's Caribbean Credits"
coins = "5000000000"
shares = "2^42"
plate_price = 1
initial_float = 2000

# ── Consumers (multi-vendor round-robin) ────────────────────────────

[[agent]]
name = "Alice"
role = "consumer"
blurb = "Tourist — atomic purchases of curry goat and mango futures via Charlie"
lat = 18.2008
lon = -63.0905          # Sandy Ground beach (atomic)

[agent.consumer]
buy_from = "Charlie"
pay_symbol = "CCC"
fund_from = "CCC-Issuer"
atomic = true

[[agent.consumer.purchases]]
want_symbol = "BCG"
redeem_at = "Bob"
interval_secs = 30

[[agent.consumer.purchases]]
want_symbol = "RMF"
redeem_at = "Rita"
interval_secs = 40

[[agent]]
name = "Eddie"
role = "consumer"
blurb = "Local investor — atomic purchases of curry goat and goat plates via Charlie"
lat = 18.2025
lon = -63.0878          # Sandy Ground village road (atomic)

[agent.consumer]
buy_from = "Charlie"
pay_symbol = "CCC"
fund_from = "CCC-Issuer"
atomic = true

[[agent.consumer.purchases]]
want_symbol = "BCG"
redeem_at = "Bob"
interval_secs = 45

[[agent.consumer.purchases]]
want_symbol = "OGP"
redeem_at = "Oscar"
interval_secs = 35

[[agent]]
name = "Karen"
role = "consumer"
blurb = "Nurse — legacy purchases of mango futures and e-bike rentals via Charlie"
lat = 18.2165
lon = -63.0560          # George Hill (legacy two-leg)

[agent.consumer]
buy_from = "Charlie"
pay_symbol = "CCC"
fund_from = "CCC-Issuer"

[[agent.consumer.purchases]]
want_symbol = "RMF"
redeem_at = "Rita"
interval_secs = 40

[[agent.consumer.purchases]]
want_symbol = "DEB"
redeem_at = "Dave"
interval_secs = 60

[[agent]]
name = "Luke"
role = "consumer"
blurb = "Tourist — atomic e-bike rentals and curry goat via Ziggy"
lat = 18.1760
lon = -63.0920          # Blowing Point (atomic via Ziggy)

[agent.consumer]
buy_from = "Ziggy"
pay_symbol = "ZIC"
fund_from = "ZIC-Issuer"
atomic = true

[[agent.consumer.purchases]]
want_symbol = "DEB"
redeem_at = "Dave"
interval_secs = 60

[[agent.consumer.purchases]]
want_symbol = "BCG"
redeem_at = "Bob"
interval_secs = 45

[[agent]]
name = "Mona"
role = "consumer"
blurb = "Local — legacy purchases of curry goat and e-bikes via Ziggy"
lat = 18.2100
lon = -63.0500          # The Valley (legacy via Ziggy)

[agent.consumer]
buy_from = "Ziggy"
pay_symbol = "ZIC"
fund_from = "ZIC-Issuer"

[[agent.consumer.purchases]]
want_symbol = "BCG"
redeem_at = "Bob"
interval_secs = 35

[[agent.consumer.purchases]]
want_symbol = "DEB"
redeem_at = "Dave"
interval_secs = 50

# ── Validator ────────────────────────────────────────────────────────

[[agent]]
name = "Victor"
role = "validator"
blurb = "Validates all chains — detects tampering and fraud"
lat = 18.2030
lon = -63.0872          # Sandy Ground village road

[agent.validator]
poll_interval_secs = 5
batch_size = 100

# ── Attacker ─────────────────────────────────────────────────────────

[[agent]]
name = "Mallory"
role = "attacker"
blurb = "Attempts double-spend attacks — should always be rejected"
lat = 18.2040
lon = -63.0865          # Sandy Ground village, north

[agent.attacker]
attack = "double_spend"
target_vendor = "Bob"
attack_interval_secs = 20
