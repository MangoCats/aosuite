# 3-chain cross-chain exchange scenario
# Tests: 3 vendors, 2 exchange agents, 2 consumers doing cross-chain trades.
#
# Chains:
#   BCG — Bob's Curry Goat (want chain for Alice)
#   CCC — Carol's Cold Coffee (payment chain / want chain for Dan)
#   MFF — Maria's Mango Futures (payment chain for Dan)
#
# Flow:
#   Alice pays CCC, receives BCG via Charlie (exchange agent)
#   Dan pays MFF, receives CCC via Eve (exchange agent)

[simulation]
name = "exchange-3chain"
recorder_port = 0
speed = 1.0             # real-time (1x)
duration_secs = 300     # 5 minutes

# ── Vendors ─────────────────────────────────────────────────────────

[[agent]]
name = "Bob"
role = "vendor"
lat = 18.2003
lon = -63.0908          # Sandy Ground beach

[agent.vendor]
symbol = "BCG"
description = "Bob's Curry Goat"
coins = "1000000000"
shares = "2^40"
plate_price = 25
initial_float = 50

[[agent]]
name = "Carol"
role = "vendor"
lat = 18.2012
lon = -63.0903          # Sandy Ground beach, north of Bob

[agent.vendor]
symbol = "CCC"
description = "Carol's Cold Coffee"
coins = "500000000"
shares = "2^38"
plate_price = 8
initial_float = 100

[[agent]]
name = "Maria"
role = "vendor"
lat = 18.1993
lon = -63.0910          # Sandy Ground beach, south of Bob

[agent.vendor]
symbol = "MFF"
description = "Maria's Mango Futures"
coins = "200000000"
shares = "2^36"
plate_price = 15
initial_float = 80

# ── Recorder (embedded) ────────────────────────────────────────────

[[agent]]
name = "Gene"
role = "recorder"

# ── Exchange agents ─────────────────────────────────────────────────

[[agent]]
name = "Charlie"
role = "exchange"
lat = 18.1975
lon = -63.0900          # Sandy Ground dock

[agent.exchange]
pairs = [
    { sell = "BCG", buy = "CCC", rate = 3.0 },   # 1 BCG plate = 3 CCC plates (25 coins = 3×8 coins)
]

[[agent.exchange.inventory]]
vendor = "Bob"
plates = 40

[[agent.exchange.inventory]]
vendor = "Carol"
plates = 120

[[agent]]
name = "Eve"
role = "exchange"
lat = 18.2165
lon = -63.0500          # The Valley

[agent.exchange]
pairs = [
    { sell = "CCC", buy = "MFF", rate = 2.0 },   # 1 CCC plate = 2 MFF plates (8 coins = 2×15 coins ≈ close enough)
]

[[agent.exchange.inventory]]
vendor = "Carol"
plates = 80

[[agent.exchange.inventory]]
vendor = "Maria"
plates = 160

# ── Consumers ───────────────────────────────────────────────────────

[[agent]]
name = "Alice"
role = "consumer"
lat = 18.2008
lon = -63.0905          # Sandy Ground beach

[agent.consumer]
buy_from = "Charlie"
want_symbol = "BCG"
pay_symbol = "CCC"
fund_from = "Carol"
redeem_at = "Bob"
interval_secs = 30

[[agent]]
name = "Dan"
role = "consumer"
lat = 18.1998
lon = -63.0912          # Sandy Ground beach, south

[agent.consumer]
buy_from = "Eve"
want_symbol = "CCC"
pay_symbol = "MFF"
fund_from = "Maria"
redeem_at = "Carol"
interval_secs = 45
