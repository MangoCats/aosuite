# Sim-D: Auditor view + adversarial agents
# Tests chain integrity validation and attack rejection.

[simulation]
name = "audit-adversarial"
title = "Security Testing — Validator vs Attackers"
description = "Five attackers try different exploits against the blockchain: double-spending, key reuse, expired UTXOs, refutation of recorded agreements, and direct database tampering. Victor the validator monitors chain integrity. All attacks should fail."
what_to_watch = [
    "Click any red attacker to see their attempts vs rejections — 'unexpected accepts' should stay at zero",
    "Eve tampers with the recorder's database directly — Victor detects the hash mismatch",
    "Fiona refutes recorded assignments then tries to re-spend — refutation can't undo a recorded transfer",
    "Alice continues normal purchases throughout — legitimate commerce is unaffected",
]
recorder_port = 0
speed = 1.0             # real-time (1x)
duration_secs = 300     # 5 minutes

# ── Bob: curry goat vendor ───────────────────────────────────────────

[[agent]]
name = "Bob"
role = "vendor"
blurb = "Curry goat vendor — target of several attacks"
lat = 18.2003
lon = -63.0908          # Sandy Ground beach

[agent.vendor]
symbol = "BCG"
description = "Bob's Curry Goat"
coins = "1000000000"
shares = "2^40"
plate_price = 25
initial_float = 50

# ── Carol: coconut cream vendor ─────────────────────────────────────

[[agent]]
name = "Carol"
role = "vendor"
blurb = "Coconut cream vendor — target of expired-UTXO attack"
lat = 18.2012
lon = -63.0903          # Sandy Ground beach, north of Bob

[agent.vendor]
symbol = "CCC"
description = "Carol's Coconut Cream"
coins = "500000000"
shares = "2^38"
plate_price = 15
initial_float = 40

# ── Gene: recorder operator (embedded) ──────────────────────────────

[[agent]]
name = "Gene"
role = "recorder"
blurb = "Recorder hosting all chains"

# ── Charlie: exchange agent ─────────────────────────────────────────

[[agent]]
name = "Charlie"
role = "exchange"
blurb = "Exchange agent — facilitates normal commerce"
lat = 18.1975
lon = -63.0900          # Sandy Ground dock

[agent.exchange]
buy_from = "Bob"
initial_buy = 50

# ── Alice: tourist consumer ─────────────────────────────────────────

[[agent]]
name = "Alice"
role = "consumer"
blurb = "Consumer — buying normally while attacks happen"
lat = 18.2008
lon = -63.0905          # Sandy Ground beach

[agent.consumer]
buy_from = "Charlie"
redeem_at = "Bob"
interval_secs = 30

# ── Victor: chain validator ─────────────────────────────────────────

[[agent]]
name = "Victor"
role = "validator"
blurb = "Validator — monitors chain integrity, detects tampering"
lat = 18.2030
lon = -63.0872          # Sandy Ground village road

[agent.validator]
poll_interval_secs = 5
batch_size = 50

# ── Mallory: double-spend attacker ──────────────────────────────────

[[agent]]
name = "Mallory"
role = "attacker"
blurb = "Double-spend attacker — tries to spend the same UTXO twice"
lat = 18.2040
lon = -63.0865          # Sandy Ground village, north

[agent.attacker]
attack = "double_spend"
target_vendor = "Bob"
attack_interval_secs = 15

# ── Trudy: key-reuse attacker ───────────────────────────────────────

[[agent]]
name = "Trudy"
role = "attacker"
blurb = "Key-reuse attacker — tries to receive on an already-used key"
lat = 18.2035
lon = -63.0868          # Sandy Ground village

[agent.attacker]
attack = "key_reuse"
target_vendor = "Bob"
attack_interval_secs = 15

# ── Oscar: expired-UTXO attacker ────────────────────────────────────

[[agent]]
name = "Oscar"
role = "attacker"
blurb = "Expired-UTXO attacker — tries to use expired shares"
lat = 18.2045
lon = -63.0860          # Sandy Ground village, northeast

[agent.attacker]
attack = "expired_utxo"
target_vendor = "Carol"
attack_interval_secs = 15

# ── Eve: chain tamper attacker (tests validator detection) ────────

[[agent]]
name = "Eve"
role = "attacker"
blurb = "Chain tamper attacker — directly modifies the database"
lat = 18.2050
lon = -63.0855          # Sandy Ground Road, north

[agent.attacker]
attack = "chain_tamper"
target_vendor = "Bob"
attack_interval_secs = 30

# ── Fiona: refutation attacker ─────────────────────────────────────

[[agent]]
name = "Fiona"
role = "attacker"
blurb = "Refutation attacker — refutes recorded agreements, then tries to re-spend"
lat = 18.2022
lon = -63.0880          # Sandy Ground village road

[agent.attacker]
attack = "refute"
target_vendor = "Bob"
attack_interval_secs = 20
